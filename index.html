<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aesthetic Mood 💗</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
    transition:0.5s;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(-45deg,#ffd6e8,#ffc2d1,#ffe5ec,#ffccd5);
    background-size:400% 400%;
    animation:gradient 12s ease infinite;
}

@keyframes gradient{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* floating glow circles */
.circle{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.3);
    backdrop-filter:blur(10px);
    animation:float 15s infinite linear;
}

.circle:nth-child(1){
    width:200px;
    height:200px;
    top:10%;
    left:5%;
}

.circle:nth-child(2){
    width:150px;
    height:150px;
    bottom:15%;
    right:10%;
}

.circle:nth-child(3){
    width:100px;
    height:100px;
    bottom:40%;
    left:15%;
}

@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-30px);}
    100%{transform:translateY(0);}
}

.container{
    position:relative;
    z-index:10;
    background:rgba(255,255,255,0.6);
    backdrop-filter:blur(20px);
    padding:50px 35px;
    border-radius:30px;
    width:380px;
    text-align:center;
    box-shadow:0 10px 40px rgba(255,182,193,0.4);
}

h1{
    color:#ff4d88;
    margin-bottom:20px;
}

.buttons{
    display:grid;
    gap:12px;
    margin-bottom:20px;
}

button{
    padding:10px;
    border:none;
    border-radius:25px;
    background:#ff4d88;
    color:white;
    cursor:pointer;
    box-shadow:0 0 15px #ff4d88;
}

button:hover{
    transform:scale(1.05);
}

.message{
    font-size:16px;
    color:#444;
    min-height:60px;
}

</style>
</head>

<body>

<!-- Glow background elements -->
<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>

<audio autoplay loop>
    <source src="sorry.mp3" type="audio/mpeg">
</audio>

<div class="container">
    <h1>How Are You Feeling? 💗</h1>

    <div class="buttons">
        <button onclick="setMood('happy')">Happy 😊</button>
        <button onclick="setMood('angry')">Angry 😤</button>
        <button onclick="setMood('sad')">Sad 😢</button>
        <button onclick="setMood('miss')">Missing You 🥺</button>
    </div>

    <div class="message" id="moodText"></div>
</div>

<script>

function setMood(mood){

    let text="";

    if(mood==="happy"){
        text="Your smile makes everything brighter ☀️💗 Stay happy always!";
    }

    if(mood==="angry"){
        text="I know you're upset… but I’m always here to fix it 🥺💕";
    }

    if(mood==="sad"){
        text="Don't be sad… I wish I could hug you right now 💞";
    }

    if(mood==="miss"){
        text="I miss you too… more than you can imagine 💗✨";
    }

    document.getElementById("moodText").innerHTML=text;
}

// autoplay fix
window.addEventListener("click",function(){
    document.querySelector("audio").play();
},{once:true});

</script>

</body>
</html>
